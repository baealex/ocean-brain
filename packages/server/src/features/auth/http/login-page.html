<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ocean Brain Sign In</title>
    <style>
        :root {
            color-scheme: light dark;
            --surface: #f7f8fa;
            --elevated: #fbfcfd;
            --fg-default: #202631;
            --fg-secondary: #626d7c;
            --fg-tertiary: #8993a2;
            --fg-placeholder: #98a2b0;
            --fg-error: #a24545;
            --fg-on-filled: #f6f8fb;
            --border-subtle: #e5e9ee;
            --border-focus: #757f8d;
            --border-error: #d47777;
            --accent-soft-danger: rgba(214, 141, 135, 0.18);
            --accent-soft-primary: rgba(93, 102, 114, 0.12);
            --cta: #23272d;
            --cta-hover: #171a1f;
            --page-bg: #f2f5f8;
            font-family: "Pretendard Variable", "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--page-bg);
            color: var(--fg-default);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --surface: #16191e;
                --elevated: #1d2229;
                --fg-default: #e6ebf2;
                --fg-secondary: #a9b3c2;
                --fg-tertiary: #7f8998;
                --fg-placeholder: #717b88;
                --fg-error: #efaaaa;
                --fg-on-filled: #12161c;
                --border-subtle: #29303a;
                --border-focus: #b4c0cf;
                --border-error: #efaaaa;
                --accent-soft-danger: rgba(215, 146, 139, 0.14);
                --accent-soft-primary: rgba(184, 192, 202, 0.12);
                --cta: #edf1f5;
                --cta-hover: #f8fafc;
                --page-bg: #101318;
            }
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--page-bg);
            padding: 24px;
        }
        .shell {
            width: min(392px, 100%);
        }
        .brand {
            margin-bottom: 14px;
            color: var(--fg-tertiary);
            font-size: 12px;
            font-weight: 700;
            line-height: 1.4;
        }
        .panel {
            padding: 24px;
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            background: var(--surface);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.1),
                0 1px 4px -2px rgba(23, 29, 38, 0.04);
        }
        h1 {
            margin: 0;
            color: var(--fg-default);
            font-size: 1.375rem;
            line-height: 1.3;
            font-weight: 700;
        }
        .lead {
            margin: 6px 0 22px;
            color: var(--fg-tertiary);
            font-size: 0.875rem;
            line-height: 1.5;
            font-weight: 500;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: var(--fg-secondary);
            font-size: 0.75rem;
            line-height: 1.4;
            font-weight: 600;
        }
        form {
            display: grid;
            gap: 16px;
        }
        .field {
            display: grid;
        }
        input {
            width: 100%;
            box-sizing: border-box;
            padding: 14px 16px;
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            background: var(--elevated);
            font-size: 16px;
            color: var(--fg-default);
            transition: border-color 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
        }
        input::placeholder {
            color: var(--fg-placeholder);
        }
        input:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 4px var(--accent-soft-primary);
        }
        .hint {
            margin-top: 10px;
            color: var(--fg-tertiary);
            font-size: 0.75rem;
            line-height: 1.4;
        }
        button {
            width: 100%;
            border: 1px solid transparent;
            border-radius: 14px;
            background: var(--cta);
            color: var(--fg-on-filled);
            padding: 14px 18px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
        }
        button:hover {
            background: var(--cta-hover);
        }
        button:active {
            transform: translateY(1px);
        }
        button:focus-visible {
            outline: none;
            box-shadow: 0 0 0 4px var(--accent-soft-primary);
        }
        .error {
            margin-bottom: 18px;
            padding: 13px 14px;
            border: 1px solid var(--border-error);
            border-radius: 14px;
            background: var(--accent-soft-danger);
            color: var(--fg-error);
            font-size: 14px;
            font-weight: 600;
        }
        @media (prefers-color-scheme: dark) {
            .panel {
                box-shadow:
                    inset 0 1px 0 rgba(255, 255, 255, 0.03),
                    0 1px 4px -2px rgba(0, 0, 0, 0.18);
            }
        }
        @media (max-width: 640px) {
            body {
                place-items: stretch;
                padding: 18px;
            }
            .shell {
                width: 100%;
                margin: auto 0;
            }
            .panel {
                padding: 22px;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <div class="brand">Ocean Brain</div>
        <section class="panel" aria-labelledby="login-title">
            <h1 id="login-title">Sign in</h1>
            <p class="lead">Enter the workspace password to continue.</p>
            <!-- OCEAN_BRAIN_LOGIN_ERROR -->
            <form method="post" action="/login">
                <input type="hidden" name="next" value="OCEAN_BRAIN_NEXT_PATH" />
                <div class="field">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" autocomplete="current-password" required autofocus />
                </div>
                <button type="submit">Sign in</button>
            </form>
            <div class="hint">This session must be authenticated before the workspace loads.</div>
        </section>
    </main>
</body>
</html>
